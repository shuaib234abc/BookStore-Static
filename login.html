<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>My Awesome Bookstore</title>
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">
        <link href="/assets/css/custom-styles.css" rel="stylesheet" />
        <script 
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
        <script
            src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
            integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc="
            crossorigin="anonymous"></script>       
    </head>
    <body style="background-color:#1987547a">
        
            <div class="container div-book-detail-info-container" style="margin-top:11rem">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xs-offset-0 col-sm-offset-0 col-md-offset-3 col-lg-offset-3 toppad" >
                        <div class="panel panel-info panel-for-login-form">
                            <div class="panel-heading">
                                <h3 class="panel-title">Sign in to your account</h3>
                            </div>
                            <div class="panel-body">
                                <div class="row">
                                    <div class=" col-md-12 col-lg-12 "> 
                                        
                                        <div class="div-custom-centred-60p-width">
                                            <form>
                                                <div class="div-custom-centred-85p-width">
                                                    <img class="mb-4" src="/assets/images/logo-v2.png" alt="">
                                                </div> 
                                                
                                                <div class="form-floating"> 
                                                    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com"> 
                                                    <label for="floatingInput">Email address</label> 
                                                </div>
                                                
                                                <div class="form-floating">
                                                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                                                    <label for="floatingPassword">Password</label>
                                                </div>
                                                
                                                <div class="form-check text-start my-3">
                                                    <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
                                                    <label class="form-check-label" for="checkDefault">Remember me</label>
                                                </div>
                                                
                                                <button class="btn btn-primary w-100 py-2" type="submit" id="btn_signIn">Sign in</button>
                                            </form>
                                        </div>
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <script type="text/javascript">
               $(document).ready(function(){
                    $("#btn_signIn").click(function(e){
                        e.preventDefault();
                        window.location.href = "http://localhost:8000/index.html";
                    });
               });          
            </script>

    </body>

</html>
