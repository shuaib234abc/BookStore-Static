<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>My Awesome Bookstore</title>
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">
        <link href="/assets/css/custom-styles.css" rel="stylesheet" />
        <script 
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
        <script
            src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
            integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc="
            crossorigin="anonymous"></script>       
    </head>
    <body>
            <div class="container">
                <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
                    <div class="col-md-3 mb-2 mb-md-0">
                        <a href="/index.html" class="d-inline-flex link-body-emphasis text-decoration-none">
                            <img src="/assets/images/logo-v2.png" />
                        </a>
                    </div>
                    <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
                        <li>
                            <a href="/index.html" class="nav-link px-2">Home</a>
                        </li>
                        <li>
                            <a href="/cart.html" class="nav-link px-2">Cart</a>
                        </li>
                        <li>
                            <a href="/faq.html" class="nav-link px-2">FAQs</a>
                        </li>
                        <li>
                            <a href="/about.html" class="nav-link px-2">About</a>
                        </li>
                    </ul>
                    <div class="col-md-3 text-end">
                        <button id="btn_loginLink" type="button" class="btn btn-outline-primary me-2">Login</button>
                    </div>
                </header>
            </div>

            <!-- the design of the element below has been taken from https://bootsnipp.com/snippets/84KX -->
            <div class="container div-book-detail-info-container">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xs-offset-0 col-sm-offset-0 col-md-offset-3 col-lg-offset-3 toppad" >
                        <div class="panel panel-info">
                            <div class="panel-heading">
                                <h3 class="panel-title">Shopping Cart</h3>
                            </div>
                            <div class="panel-body">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>Product</th>
                                            <th>Quantity</th>
                                            <th class="text-center">Price</th>
                                            <th class="text-center">Total</th>
                                            <th>&nbsp;</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td class="col-sm-8 col-md-6">
                                                <div class="media">
                                                    <a class="thumbnail pull-left pull-left-custom" href="#">
                                                        <img class="media-object img-shopping-cart-product" src="/assets/images/books/Screenshot-book18.png">
                                                    </a>
                                                    <div class="media-body">
                                                        <h4 class="media-heading"><a href="#">হালাল হরর স্টোরিজ</a></h4>
                                                        <h5 class="media-heading"> by <a href="#">Mr. Author</a></h5>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="col-sm-1 col-md-1" style="text-align: center">
                                                <input type="number" class="form-control" id="input_cart_product1" value="3">
                                            </td>
                                            <td class="col-sm-1 col-md-1 text-center">
                                                <strong>$4.87</strong>
                                            </td>
                                            <td class="col-sm-1 col-md-1 text-center">
                                                <strong>$14.61</strong>
                                            </td>
                                            <td class="col-sm-1 col-md-1">
                                                <button class="btn btn-danger d-inline-flex align-items-center" type="button">
                                                    Remove
                                                </button>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="col-md-6">
                                                <div class="media">
                                                    <a class="thumbnail pull-left pull-left-custom" href="#">
                                                        <img class="media-object img-shopping-cart-product" src="/assets/images/books/Screenshot-book1.png">
                                                    </a>
                                                    <div class="media-body">
                                                        <h4 class="media-heading"><a href="#">বঙ্গ ভঙ্গ ও সমকালীন বংগো সমাজ</a></h4>
                                                        <h5 class="media-heading"> by <a href="#">Mr. Another Author</a></h5>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="col-md-1" style="text-align: center">
                                                <input type="number" class="form-control" id="input_cart_product2" value="2">
                                            </td>
                                            <td class="col-md-1 text-center">
                                                <strong>$4.99</strong>
                                            </td>
                                            <td class="col-md-1 text-center">
                                                <strong>$9.98</strong>
                                            </td>
                                            <td class="col-md-1">
                                                <button class="btn btn-danger d-inline-flex align-items-center" type="button">
                                                    Remove
                                                </button>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td><h5>Subtotal</h5></td>
                                            <td class="text-right"><h5><strong>$24.59</strong></h5></td>
                                        </tr>
                                        <tr>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td><h5>Estimated shipping</h5></td>
                                            <td class="text-right"><h5><strong>$6.94</strong></h5></td>
                                        </tr>
                                        <tr>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td><h3>Total</h3></td>
                                            <td class="text-right"><h3><strong>$31.53</strong></h3></td>
                                        </tr>
                                        <tr>
                                            <td>&nbsp;</td>
                                            <td>&nbsp;</td>
                                            <td colspan="3" style="text-align: right;">
                                                <button class="btn btn-info d-inline-flex align-items-center" type="button">
                                                    Continue Shopping
                                                </button>

                                                <button class="btn btn-success d-inline-flex align-items-center" type="button">
                                                    Checkout
                                                </button>                                        
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>



            <div class="container">
                <div class="row">
                    <div class="col-sm-12 col-md-12 col-md-offset-1">
                        
                    </div>
                </div>
            </div>
            
            <script type="text/javascript">
                $(document).ready(function(){
                    $("#btn_loginLink").click(function(e){
                        e.preventDefault();
                        window.location.href = "http://localhost:8000/login.html";
                    });
                });
            </script>            
    </body>
</html>
